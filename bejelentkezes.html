<!DOCTYPE html>
<html>
<head>

  <title>Moziműsor</title>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>


<body>
  <h1>Web programozás - 1 Előadás Beadandó Feladat</h1>
  <h2>Üdvözlünk a Művészfil KHT oldalán!</h2>

<main>

    <div class="doboz">
      <div class="container">
        <div class="login">

          <h3>Bejelentkezés</h3>

          <p>Felhasználónév:</p>
          <input>

          <p>Jelszó:</p>
          <div class="password-box">
          <input type="password" id="pass">
          <span onclick="togglePassword()" class="eye">👁️</span>
          </div>

          <button onclick="login()">Belépés</button>
          <p id="msg"></p>

        </div>
      </div>
    </div>


</main>


<footer>
  Gombár Dániel - ITCK81 és Drobni Zsomor - EV4GAC
</footer>


<script>
  function login(){
    document.getElementById("msg").innerText = "Sikeres belépés";
    window.location.href = "index.html";
  }

  function togglePassword() {
    let input = document.getElementById("pass");

    if (input.type === "password") {
      input.type = "text";
    } else {
      input.type = "password";
    }
  }

</script>

</body>
</html>
