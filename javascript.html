<!DOCTYPE html>
<html>

<head>
  <title>JavaScript CRUD</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="javas.css">
</head>

<body>

<h1>JavaScript CRUD - film</h1>

<nav>
  <div class="vissza">
    <button>Vissza</button>
  </div>
</nav>

<main>
  <div class="doboz">
    <h3>filmk kezelése: </h3>
    <div class="form">
      <input id="ide" placeholder="ID">
      <input id="nev" placeholder="Film neve">
      <input id="ev" placeholder="Kiadás">
      <input id="per" placeholder="Hossz">
      <button>Mentés</button>
    </div>
    <hr>
    <div id="list"></div>
  </div>
</main>


<script>
  let filmek = [];
  let editIndex = null;

  const list = document.getElementById("list");
  const nevInput = document.getElementById("nev");
  const evInput = document.getElementById("ev");
  const ideInput = document.getElementById("ide");
  const perInput = document.getElementById("per");

  async function loadData() {
    try {
      filmek = [];

      const res = await fetch("film.txt");
      const text = await res.text();

      const sorok = text.split("\n");

      sorok.forEach((sor, index) => {
        if (index === 0 || sor.trim() === "") return;

        const adat = sor.trim().split(";");

        filmek.push({
          id: adat[0],
          nev: adat[1],
          ev: adat[2],
          perohely: adat[3]
        });
      });

      render();
    } catch (err) {
      console.error("Hiba betöltéskor:", err);
    }
  }

  function render() {
    list.innerHTML = "";

    filmek.forEach((film, index) => {
      const div = document.createElement("div");

      const id = document.createElement("p");
      id.textContent = "ID: " + film.id;

      const nev = document.createElement("p");
      nev.innerHTML = "<b>" + film.nev + "</b>";

      const ev = document.createElement("p");
      ev.textContent = "Kiadás: " + film.ev;

      const tel = document.createElement("p");
      tel.textContent = "Perc: " + film.perohely;

      const editBtn = document.createElement("button");
      editBtn.textContent = "Szerkesztés";
      editBtn.addEventListener("click", () => edit(index));

      const delBtn = document.createElement("button");
      delBtn.textContent = "Törlés";
      delBtn.addEventListener("click", () => removeItem(index));

      div.appendChild(id);
      div.appendChild(nev);
      div.appendChild(ev);
      div.appendChild(tel);
      div.appendChild(editBtn);
      div.appendChild(delBtn);

      list.appendChild(div);
      list.appendChild(document.createElement("hr"));
    });
  }

  function save() {
    const id = ideInput.value.trim();
    const nev = nevInput.value.trim();
    const ev = evInput.value.trim();
    const tel = perInput.value.trim();

    const vanIlyen = filmek.some((m, i) => m.id === id && i !== editIndex);

    if (vanIlyen) {
      alert("Ez az ID már létezik!");
      return;
    }

    if (!nev || !ev) {
      alert("A név és cím kötelező!");
      return;
    }

    if (tel == "" || isNaN(tel)) {
      alert("A férőhely csak szám lehet!");
      return;
    }

    if (editIndex === null) {
      filmek.push({ id, nev, ev, perohely: tel });
    } else {
      filmek[editIndex] = { id, nev, ev, perohely: tel };
      editIndex = null;
    }

    ideInput.value = "";
    nevInput.value = "";
    evInput.value = "";
    perInput.value = "";

    render();
  }

  function edit(index) {
    const film = filmek[index];

    ideInput.value = film.id;
    nevInput.value = film.nev;
    evInput.value = film.ev;
    perInput.value = film.perohely;

    editIndex = index;
  }

  function removeItem(index) {
    if (confirm("Biztos törlöd?")) {
      filmek.splice(index, 1);
      render();
    }
  }

  document.querySelector(".form button").addEventListener("click", save);
  document.querySelector(".vissza button").addEventListener("click", () => {
    window.location.href = "index.html";
  });

  loadData();
</script>
</body>
</html>
