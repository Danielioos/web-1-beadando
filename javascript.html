<!DOCTYPE html>
<html>

<head>
  <title>JavaScript CRUD</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="javas.css">
</head>

<body>

<h1>JavaScript CRUD - Mozi</h1>

<nav>
<div class="vissza">
    <button>Vissza</button>
</div>
</nav>

<main>
  <div class="doboz">
    <h3>Mozik kezelése: </h3>
    <div class="form">
      <input id="ide" placeholder="ID">
      <input id="nev" placeholder="Mozi neve">
      <input id="cim" placeholder="Cím">
      <input id="fer" placeholder="Ferohely">
      <button>Mentés</button>
    </div>
    <hr>
    <div id="list"></div>
  </div>
</main>


<script>
  let mozik = [];
  let editIndex = null;

  const list = document.getElementById("list");
  const nevInput = document.getElementById("nev");
  const cimInput = document.getElementById("cim");
  const ideInput = document.getElementById("ide");
  const ferInput = document.getElementById("fer");

  async function loadData() {
    try {
      const res = await fetch("mozi.txt");
      const text = await res.text();

      const sorok = text.split("\n");

      sorok.forEach((sor, index) => {
        if (index === 0 || sor.trim() === "") return;

        const adat = sor.trim().split(";");

        mozik.push({
          id: adat[0],
          nev: adat[1],
          cim: adat[2],
          ferohely: adat[3]
        });
      });

      render();
    } catch (err) {
      console.error("Hiba betöltéskor:", err);
    }
  }

  function render() {
    list.innerHTML = "";

    mozik.forEach((mozi, index) => {
      const div = document.createElement("div");

      const id = document.createElement("p");
      id.textContent = "ID: " + mozi.id;

      const nev = document.createElement("p");
      nev.innerHTML = "<b>" + mozi.nev + "</b>";

      const cim = document.createElement("p");
      cim.textContent = "Cím: " + mozi.cim;

      const tel = document.createElement("p");
      tel.textContent = "Ferohely: " + mozi.ferohely;

      const editBtn = document.createElement("button");
      editBtn.textContent = "Szerkesztés";
      editBtn.addEventListener("click", () => edit(index));

      const delBtn = document.createElement("button");
      delBtn.textContent = "Törlés";
      delBtn.addEventListener("click", () => removeItem(index));

      div.appendChild(id);
      div.appendChild(nev);
      div.appendChild(cim);
      div.appendChild(tel);
      div.appendChild(editBtn);
      div.appendChild(delBtn);

      list.appendChild(div);
      list.appendChild(document.createElement("hr"));
    });
  }

  function save() {
    const id = ideInput.value.trim();
    const nev = nevInput.value.trim();
    const cim = cimInput.value.trim();
    const tel = ferInput.value.trim();

    const vanIlyen = mozik.some((m, i) => m.id === id && i !== editIndex);

    if (vanIlyen) {
      alert("Ez az ID már létezik!");
      return;
    }

    if (!nev || !cim) {
      alert("A név és cím kötelező!");
      return;
    }

    if (tel == "" || isNaN(tel)) {
      alert("A férőhely csak szám lehet!");
      return;
    }

    if (editIndex === null) {
      mozik.push({ id, nev, cim, ferohely: tel });
    } else {
      mozik[editIndex] = { id, nev, cim, ferohely: tel };
      editIndex = null;
    }

    ideInput.value = "";
    nevInput.value = "";
    cimInput.value = "";
    ferInput.value = "";

    render();
  }

  function edit(index) {
    const mozi = mozik[index];

    ideInput.value = mozi.id;
    nevInput.value = mozi.nev;
    cimInput.value = mozi.cim;
    ferInput.value = mozi.ferohely;

    editIndex = index;
  }

  function removeItem(index) {
    if (confirm("Biztos törlöd?")) {
      mozik.splice(index, 1);
      render();
    }
  }

  document.querySelector(".form button").addEventListener("click", save);
  document.querySelector(".vissza button").addEventListener("click", () => {
    window.location.href = "index.html";
  });

  loadData();
</script>
</body>
</html>
